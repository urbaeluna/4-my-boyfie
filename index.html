<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>from ur future wife</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #1a0000, #000000);
  color: white;
  overflow: hidden;
}

/* BACKGROUND UPGRADE */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;
  background: radial-gradient(circle at 30% 30%, rgba(255,0,80,0.15), transparent 40%),
              radial-gradient(circle at 70% 70%, rgba(255,50,100,0.1), transparent 40%),
              radial-gradient(circle at 50% 20%, rgba(255,0,0,0.1), transparent 50%);
  animation: moveBg 15s linear infinite;
  z-index: -2;
}

body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  background: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='2' cy='2' r='2' fill='white' opacity='0.2'/%3E%3C/svg%3E");
  opacity: 0.2;
  animation: sparkleBg 8s linear infinite;
  z-index: -1;
}

@keyframes moveBg {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@keyframes sparkleBg {
  from { transform: translateY(0); }
  to { transform: translateY(-100px); }
}

/* FLOATING LIGHT ORBS */
.orb {
  position: absolute;
  width: 80px;
  height: 80px;
  background: radial-gradient(circle, rgba(255,80,120,0.4), transparent 70%);
  border-radius: 50%;
  filter: blur(20px);
  animation: floatOrb 10s ease-in-out infinite;
}

@keyframes floatOrb {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-50px); }
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle, #1a0000, #000);
  z-index: 10;
  text-align: center;
}

#intro h1 {
  font-size: 2.5rem;
  color: #ff4d6d;
  text-shadow: 0 0 30px #ff1a4d;
}

.playBtn {
  margin-top: 30px;
  padding: 15px 35px;
  border-radius: 40px;
  border: none;
  background: linear-gradient(45deg, #ff1a4d, #990000);
  color: white;
  cursor: pointer;
  box-shadow: 0 0 25px #ff1a4d;
}

/* COUNTER */
#counter {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 40px;
  font-weight: 600;
  text-shadow: 0 0 15px white;
}

/* GAME */
.container { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; }
#gameArea { width:350px; height:350px; position:relative; }

/* WHITE HEART */
.target {
  width: 50px;
  height: 50px;
  position: absolute;
  transform: rotate(-45deg);
  cursor: pointer;
}

.target:hover { animation: pulse 0.6s infinite; }

@keyframes pulse {
  0% { transform: scale(1) rotate(-45deg); }
  50% { transform: scale(1.3) rotate(-45deg); }
  100% { transform: scale(1) rotate(-45deg); }
}

.target::before,
.target::after {
  content:"";
  position:absolute;
  width:50px;
  height:50px;
  background:white;
  border-radius:50%;
  box-shadow: 0 0 15px white;
}

.target::before { top:-25px; }
.target::after { left:25px; }

.target { background:white; box-shadow:0 0 15px white; }

/* PARTICLE */
.particle {
  position:absolute;
  width:8px;
  height:8px;
  background:white;
  transform:rotate(45deg);
  animation: explode 0.8s forwards;
}

@keyframes explode {
  to { transform: translate(var(--x), var(--y)) scale(0.3); opacity:0; }
}

/* REWARD */
#reward { display:flex; height:100vh; backdrop-filter: blur(10px); }
.left { width:45%; display:flex; justify-content:center; align-items:center; }
.right { width:55%; padding:40px; }

.polaroid {
  background:white;
  padding:15px;
  width:320px;
  height:380px;
  display:flex;
  flex-direction:column;
  align-items:center;
  box-shadow:0 0 40px white;
  animation: float 3s infinite;
}

.polaroid img {
  width:280px;
  height:280px;
  object-fit:cover;
}

@keyframes float {
  50% { transform: translateY(-20px); }
}

/* LOVE RAIN */
.love {
  position:absolute;
  color:white;
  font-size:18px;
  animation: fall linear infinite;
}

@keyframes fall {
  to { transform: translateY(100vh); opacity:0; }
}

.hidden { display:none; }
/* SHOOTING STARS */
.star {
  position: fixed;
  width: 2px;
  height: 80px;
  background: linear-gradient(white, transparent);
  opacity: 0.6;
  transform: rotate(45deg);
  animation: shooting 2s linear infinite;
}

@keyframes shooting {
  from { transform: translateY(0) translateX(0) rotate(45deg); opacity:1; }
  to { transform: translateY(600px) translateX(600px) rotate(45deg); opacity:0; }
}

/* CONFETTI */
.confetti {
  position: fixed;
  width: 6px;
  height: 10px;
  background: white;
  opacity: 0.7;
  animation: fallConfetti linear infinite;
}

@keyframes fallConfetti {
  to { transform: translateY(100vh) rotate(360deg); opacity:0; }
}

/* HEART CURSOR TRAIL */
.trail {
  position: fixed;
  color: white;
  font-size: 12px;
  pointer-events: none;
  animation: fadeTrail 1s forwards;
}

@keyframes fadeTrail {
  to { transform: translateY(-20px); opacity:0; }
}

</style>
</head>
<body>

<div id="intro">
  <h1>Haloo sayangkuu!! ❤️</h1>
  <p>Aku siapin sesuatu spesial buat kamu...</p>
  <button class="playBtn" onclick="startIntro()">Play with lovee 💌</button>
</div>

<div id="counter" class="hidden">25</div>

<div class="container hidden" id="startScreen">
  <h2>Hit the hearts 🤍</h2>
  <div id="gameArea"></div>
</div>

<div id="reward" class="hidden">
  <div class="left">
    <div class="polaroid">
      <img src="https://urbaeluna.github.io/4-my-boyfie/photo.jpeg">
      <small style="color:black;">LOVE YOU EVERY FUCKING TIMES 🤍</small>
    </div>
  </div>
  <div class="right">
    <p id="typingText"></p>
  </div>
</div>

<script>
let score = 0;
const maxScore = 25;
const message = `Happy 25th birthday, my love 🤍
Hari ini kamu genap 25 tahun, and I’m truly grateful punya kamu di hidupku. I am so proud of you atas semua yang sudah kamu lewati, semua cobaan yang datang, and how you still choose to keep going even when it’s not easy. Kamu itu kuat, lebih dari yang kamu kira, and that honestly amazes me every single day.

Aku melihat kamu bukan cuma sebagai lelaki yang aku cintai, but also as someone dengan hati yang besar, penuh ketulusan dan keberanian. You’ve been through so much, tapi kamu tetap memilih jadi orang baik, and that’s why I keep falling in love with you over and over again.

Di umur kamu yang ke-25 ini, aku mau kamu tahu kalau sekarang kamu punya aku sebagai rumah—your safe place, tempat kamu pulang dan beristirahat dari capeknya dunia. You don’t always have to be strong in front of me. Kamu boleh lelah, kamu boleh rapuh, because I will always be here for you, no matter what.

Aku berdoa semoga kamu selalu panjang umur, sehat terus, dan semua urusan kamu dimudahkan. I hope all your dreams come true, satu per satu, and I’ll always stay right here beside you—supporting you and believing in you.

Terima kasih sudah bertahan sejauh ini. Thank you for being strong and for being someone I’ll always be proud of. Aku bangga banget sama semua pencapaian kamu, sekecil apa pun itu, because I know none of it came easy.

Aku sayang banget sama kamu. I love you more than words could ever explain. Aku mencintai kamu dengan cara yang sederhana tapi dalam, and I will keep loving you—today, tomorrow, and always.

Sekali lagi, happy birthday sayang. Let’s keep growing together and face everything side by side 🤍
🤍`;

function startIntro(){
  document.getElementById('intro').style.display='none';
  document.getElementById('startScreen').classList.remove('hidden');
  document.getElementById('counter').classList.remove('hidden');
  updateCounter();
  startGame();
}

function updateCounter(){
  const remaining = maxScore - score;
  document.getElementById('counter').innerText = remaining;
}

function startGame(){
  const area = document.getElementById('gameArea');
  area.innerHTML='';
  const t = document.createElement('div');
  t.classList.add('target');

  t.onclick = (e)=>{
    score++;
    explode(e.clientX,e.clientY);
    updateCounter();
    move(t);
    if(score>=maxScore) showReward();
  };

  move(t);
  area.appendChild(t);
}

function move(t){
  t.style.left = Math.random()*300+'px';
  t.style.top = Math.random()*300+'px';
}

function explode(x,y){
  for(let i=0;i<12;i++){
    let p=document.createElement('div');
    p.classList.add('particle');
    p.style.left=x+'px';
    p.style.top=y+'px';
    p.style.setProperty('--x',(Math.random()*120-60)+'px');
    p.style.setProperty('--y',(Math.random()*120-60)+'px');
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),800);
  }
}

function showReward(){
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('counter').classList.add('hidden');
  document.getElementById('reward').classList.remove('hidden');
  typeText();
  loveRain();
}

function typeText(){
  let i=0;
  const el=document.getElementById('typingText');
  function t(){
    if(i<message.length){
      el.innerHTML+=message[i];
      i++;
      setTimeout(t,25);
    }
  }
  t();
}

function loveRain(){
  setInterval(()=>{
    let l=document.createElement('div');
    l.classList.add('love');
    l.innerHTML='❤';
    l.style.left=Math.random()*window.innerWidth+'px';
    l.style.animationDuration=(Math.random()*3+2)+'s';
    document.body.appendChild(l);
    setTimeout(()=>l.remove(),5000);
  },200);
}
</script>


<!-- FLOATING ORBS -->
<div class="orb" style="top:20%; left:10%;"></div>
<div class="orb" style="top:60%; left:80%;"></div>
<div class="orb" style="top:80%; left:30%;"></div>


<!-- FLOATING ORBS -->
<div class="orb" style="top:20%; left:10%;"></div>
<div class="orb" style="top:60%; left:80%;"></div>
<div class="orb" style="top:80%; left:30%;"></div>

<script>
/* SHOOTING STARS */
setInterval(()=>{
  let s=document.createElement('div');
  s.classList.add('star');
  s.style.top=Math.random()*window.innerHeight+'px';
  s.style.left=Math.random()*window.innerWidth+'px';
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),2000);
},1500);

/* CONFETTI (more romantic vibe when reward) */
function startConfetti(){
  setInterval(()=>{
    let c=document.createElement('div');
    c.classList.add('confetti');
    c.style.left=Math.random()*window.innerWidth+'px';
    c.style.animationDuration=(Math.random()*3+2)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5000);
  },150);
}

/* HOOK INTO REWARD */
const oldShowReward = showReward;
showReward = function(){
  oldShowReward();
  startConfetti();
};

/* CURSOR HEART TRAIL */
document.addEventListener('mousemove',(e)=>{
  let t=document.createElement('div');
  t.classList.add('trail');
  t.innerHTML='❤';
  t.style.left=e.clientX+'px';
  t.style.top=e.clientY+'px';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),1000);
});
</script>

</body>
</html>
